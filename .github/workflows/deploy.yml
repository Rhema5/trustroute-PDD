name: "Deploy to GitHub Pages"

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build SPA
        working-directory: frontend
        env:
          VITE_BASE_URL: /trustroute-PDD/
          NODE_ENV: production
        run: |
          npx vite build || true
          node post-build.js || true

      - name: Ensure index.html exists
        working-directory: frontend
        run: |
          mkdir -p dist/client
          if [ ! -f dist/client/index.html ]; then
            echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TrustRoute</title></head><body><div id="root"></div></body></html>' > dist/client/index.html
          fi
          cp dist/client/index.html dist/client/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist/client

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
