name: 🔒 Security Review & Audit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 📦 Install Dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: 🔍 npm audit
        working-directory: frontend
        run: npm audit --json > ../audit/npm-audit-results.json 2>&1 || true

      - name: 🔎 Semgrep SAST Scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/react
            p/typescript
            p/owasp-top-ten
            p/security-audit
        continue-on-error: true
        env:
          SEMGREP_RULES: "p/javascript p/react"

      - name: 🔑 Gitleaks Secret Scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: 🐳 Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH,MEDIUM"
          output: "audit/trivy-results.txt"
        continue-on-error: true

      - name: 🔍 Dependency Review
        uses: actions/dependency-review-action@v4
        if: github.event_name == 'pull_request'
        continue-on-error: true

      - name: 📊 Generate Security Summary
        run: |
          echo "# 🔒 Security Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Scans Performed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ npm audit (dependency vulnerabilities)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Semgrep SAST (source code analysis)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Gitleaks (secrets scanning)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Trivy (filesystem vulnerabilities)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Security Reports" >> $GITHUB_STEP_SUMMARY
          echo "See artifacts: \`security-audit-results\`" >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload Security Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-audit-results
          path: |
            audit/
          retention-days: 30
