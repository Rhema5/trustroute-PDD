name: "Selenium E2E Tests"

on:
  push:
    branches: [master, main]
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  selenium-e2e:
    name: "Selenium E2E — 500 Tests vs Live Site"
    runs-on: ubuntu-latest

    env:
      BASE_URL: "https://rhema5.github.io/trustroute-PDD/"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Python Dependencies
        run: |
          pip install --quiet \
            selenium==4.18.1 \
            webdriver-manager==4.0.1 \
            openpyxl==3.1.2 \
            jinja2==3.1.4 \
            requests==2.31.0

      - name: Wait for Live Site (max 30s)
        run: |
          for i in $(seq 1 3); do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
              "https://rhema5.github.io/trustroute-PDD/" --max-time 10 || echo "000")
            echo "Check $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then echo "Site is live!"; break; fi
            sleep 5
          done

      - name: Run Selenium Test Suite
        run: python automation/run_tests.py || true
        timeout-minutes: 15

      - name: Generate Excel + HTML Reports
        if: always()
        run: |
          python automation/generate_excel_report.py
          python automation/generate_html_report.py

      - name: Commit Reports
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git pull --rebase origin master || true
          git add "Test Results/" || true
          git diff --staged --quiet || git commit -m "ci: Selenium E2E report [skip ci]"
          git push origin master || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-e2e-${{ github.run_number }}
          path: |
            Test Results/Excel/
            Test Results/HTML/
            Test Results/JSON/
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## Selenium E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Target | https://rhema5.github.io/trustroute-PDD/ |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Cases | 500 (10 modules) |" >> $GITHUB_STEP_SUMMARY
          echo "| Framework | Selenium 4.18 + Python 3.11 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Excel and HTML reports generated and uploaded to Artifacts." >> $GITHUB_STEP_SUMMARY
