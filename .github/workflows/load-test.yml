name: "k6 Load Testing (50 VUs x 60s)"

on:
  push:
    branches: [master, main]
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * *"

permissions:
  contents: write

jobs:
  load-test:
    name: "Baseline Load Test — 50 VUs x 60s"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Create Reports Directory
        run: mkdir -p testing/reports

      - name: Run k6 Load Test
        run: |
          k6 run testing/k6-load-test.js || true
        timeout-minutes: 5
        env:
          BASE_URL: "https://rhema5.github.io/trustroute-PDD"
          K6_NO_COLOR: "1"

      - name: Generate Load Test Report
        if: always()
        run: |
          echo "# k6 Load Test Summary" > testing/reports/load-test-report.md
          echo "**Date:** $(date -u)" >> testing/reports/load-test-report.md
          echo "**Target:** https://rhema5.github.io/trustroute-PDD/" >> testing/reports/load-test-report.md
          echo "" >> testing/reports/load-test-report.md
          if [ -f testing/reports/k6-summary.json ]; then
            python3 -c "
          import json, sys
          try:
              d = json.load(open('testing/reports/k6-summary.json'))
              m = d.get('metrics', {})
              dur = m.get('http_req_duration', {}).get('values', {})
              reqs = m.get('http_reqs', {}).get('values', {})
              errs = m.get('http_req_failed', {}).get('values', {})
              print(f'| Metric | Value |')
              print(f'|--------|-------|')
              print(f'| Requests/sec | {reqs.get(\"rate\",0):.1f} req/s |')
              print(f'| Avg Response | {dur.get(\"avg\",0):.0f}ms |')
              print(f'| P95 Response | {dur.get(\"p(95)\",0):.0f}ms |')
              print(f'| Error Rate | {errs.get(\"rate\",0)*100:.2f}% |')
          except Exception as e:
              print('Metrics summary generated in JSON artifact')
          " >> testing/reports/load-test-report.md
          fi

      - name: Commit Load Test Report
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git pull --rebase origin master || true
          git add testing/reports/ || true
          git diff --staged --quiet || git commit -m "ci: k6 load test report [skip ci]"
          git push origin master || true

      - name: Upload Load Test Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-load-test-${{ github.run_number }}
          path: testing/reports/
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## k6 Load Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Virtual Users | 50 VUs |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | https://rhema5.github.io/trustroute-PDD/ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f testing/reports/k6-summary.json ]; then
            python3 -c "
          import json
          try:
              d = json.load(open('testing/reports/k6-summary.json'))
              m = d.get('metrics', {})
              dur = m.get('http_req_duration', {}).get('values', {})
              reqs = m.get('http_reqs', {}).get('values', {})
              errs = m.get('http_req_failed', {}).get('values', {})
              print(f'| Requests/sec | {reqs.get(\"rate\",0):.1f} req/s |')
              print(f'| Avg Response | {dur.get(\"avg\",0):.0f}ms |')
              print(f'| P95 Response | {dur.get(\"p(95)\",0):.0f}ms |')
              print(f'| Error Rate   | {errs.get(\"rate\",0)*100:.2f}% |')
          except Exception:
              pass
          " >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          fi
