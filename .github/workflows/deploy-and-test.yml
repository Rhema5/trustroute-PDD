name: 🚀 Deploy & E2E Test Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────
  # STAGE 1-4: BUILD + STATIC ANALYSIS
  # ─────────────────────────────────────────────
  build:
    name: 🏗️ Build Application
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install Frontend Dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: 🔍 Static Analysis (ESLint)
        working-directory: frontend
        run: npm run lint --if-present
        continue-on-error: true

      - name: 🏗️ Build for GitHub Pages
        working-directory: frontend
        env:
          VITE_BASE_URL: /trustroute-PDD/
          VITE_RAZORPAY_KEY_ID: ${{ secrets.VITE_RAZORPAY_KEY_ID }}
        run: npm run build

      - name: 📤 Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist/client

  # ─────────────────────────────────────────────
  # STAGE 5: DEPLOY TO GITHUB PAGES
  # ─────────────────────────────────────────────
  deploy:
    name: 🌐 Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─────────────────────────────────────────────
  # STAGE 6-7: VERIFY DEPLOYMENT
  # ─────────────────────────────────────────────
  verify-deployment:
    name: ✅ Verify Deployment
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: ⏳ Wait for deployment to stabilize
        run: sleep 30

      - name: 🔍 Verify HTTP 200
        run: |
          BASE_URL="https://rhema5.github.io/trustroute-PDD/"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$BASE_URL")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Deployment verification FAILED — HTTP $STATUS"
            exit 1
          fi
          echo "✅ Deployment verified — HTTP 200 OK"

  # ─────────────────────────────────────────────
  # STAGE 8: SELENIUM E2E TESTS
  # ─────────────────────────────────────────────
  selenium-e2e:
    name: 🤖 Selenium E2E Tests
    needs: verify-deployment
    runs-on: ubuntu-latest
    env:
      BASE_URL: https://rhema5.github.io/trustroute-PDD/
      AGENT_EMAIL: agent2@gmail.com
      AGENT_PASS: agent2
      ENTERPRISE_EMAIL: enterprise1@gmail.com
      ENTERPRISE_PASS: enterprise1
      CUSTOMER_EMAIL: customer1@gmail.com
      CUSTOMER_PASS: customer1
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install Python Dependencies
        run: pip install -r automation/requirements.txt

      - name: 🌐 Install Chrome + ChromeDriver
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
          pip install webdriver-manager

      - name: 🧪 Run Selenium Test Suite
        run: python automation/run_tests.py
        continue-on-error: true

      - name: 📊 Generate Excel Report
        run: python automation/generate_excel_report.py

      - name: 📄 Generate HTML Report
        run: python automation/generate_html_report.py

      - name: 💾 Commit Reports to Repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add "Test Results/" automation/reports/ || true
          git diff --staged --quiet || git commit -m "📊 Auto-generated test reports [skip ci]"
          git push origin HEAD:main || true

      - name: 📤 Upload Selenium Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-test-results
          path: |
            Test Results/
            automation/reports/
            automation/screenshots/
            automation/logs/
          retention-days: 30

      - name: 📋 Publish GitHub Summary
        if: always()
        run: |
          if [ -f "Test Results/Summary/summary.md" ]; then
            cat "Test Results/Summary/summary.md" >> $GITHUB_STEP_SUMMARY
          fi

  # ─────────────────────────────────────────────
  # STAGE 5 (PARALLEL): K6 LOAD TEST
  # ─────────────────────────────────────────────
  load-test:
    name: ⚡ k6 Load Test (100 VUs × 60s)
    needs: verify-deployment
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: ⚡ Run Baseline Load Test
        run: k6 run --out json=testing/load-results.json testing/k6-load-test.js
        continue-on-error: true

      - name: 📤 Upload Load Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-results
          path: testing/load-results.json
          retention-days: 30
